services:
  - type: web
    name: opus-call-recorder
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: HUBSPOT_API_KEY
        sync: false
      - key: LGM_API_KEY
        sync: false
      - key: LGM_AUDIENCE_ID
        sync: false
      - key: HUNTER_API_KEY
        sync: false

  - type: cron
    name: opus-lead-cron
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python apify_cron_job.py
    schedule: "0 13 * * 1-5"
    envVars:
      - key: APIFY_API_TOKEN
        sync: false
      - key: APIFY_ACTOR_ID
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: HUBSPOT_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: CAROLINA_EMAIL
        sync: false
      - key: LGM_API_KEY
        sync: false
      - key: LGM_AUDIENCE_ID
        sync: false
